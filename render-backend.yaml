services:
  # MCP Client Backend - FastAPI service that processes user queries
  - type: web  
    name: ai-portfolio-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp-client/main.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set this in Render dashboard
      - key: MCP_SERVER_URL
        value: https://yubi-github-mcp-server.onrender.com/mcp
      - key: FRONTEND_URL
        value: https://ai-portfolio.vercel.app
      - key: PORT
        value: 9000
    healthCheckPath: /
