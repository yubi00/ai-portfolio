services:
  # MCP Client Backend - FastAPI service that processes user queries
  - type: web  
    name: ai-portfolio-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp-client/main.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set this in Render dashboard
      - key: MCP_SERVER_URL
        value: https://yubi-github-mcp-server.onrender.com/mcp
      - key: PORT
        value: 9000
    healthCheckPath: /
    
  # Frontend - React/Vite static site
  - type: web
    name: ai-portfolio-frontend
    runtime: static
    plan: free
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-portfolio-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

